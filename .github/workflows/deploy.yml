name: Build and Deploy

on:
  push:
    branches:
      - main
      - develop # 如果你想在 develop 分支提交时也自动部署，请保留

env:
  # 在此处修改为你的 Docker Hub 用户名
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  GATEWAY_IMAGE_NAME: uclaw-gateway
  WEB_IMAGE_NAME: uclaw-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/gateway/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.GATEWAY_IMAGE_NAME }}:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/${{ env.WEB_IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    # 重要：如果使用 run 直接在服务器执行，这里必须指定您的自建 runner 标签 (例如 self-hosted)
    # 如果您还没有配置 self-hosted runner，这个脚本会在 GitHub 的云端服务器端执行，无法真正重启您的腾讯云服务。
    runs-on: self-hosted 
    steps:
      - name: Pull and Restart Containers
        run: |
          cd ~/uclaw 2>/dev/null || cd ~/uclaw
          docker compose pull
          docker compose down
          docker compose up -d
          docker image prune -f
