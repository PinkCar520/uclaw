<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Ocean Wave Gradients -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005C97" />
      <stop offset="100%" stop-color="#363795" />
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <!-- Kun (Whale) Gradient -->
    <linearGradient id="kunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8E53" />
      <stop offset="100%" stop-color="#FF512F" />
    </linearGradient>
    
    <!-- Premium Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#FF512F" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- The Kun (Whale) Leaping -->
  <g filter="url(#shadow)">
    <!-- Tail -->
    <path d="M 100,180 C 80,150 40,110 10,130 C 40,150 70,165 90,170 C 50,180 20,200 10,230 C 40,210 80,195 100,180 Z" fill="url(#kunGrad)" />
    
    <!-- Main Body -->
    <path d="M 100,180 C 140,80 260,60 340,130 C 370,160 340,185 310,180 C 240,170 160,210 100,180 Z" fill="url(#kunGrad)" />
    
    <!-- Pectoral Fin -->
    <path d="M 180,185 C 200,230 250,250 270,210 C 240,200 210,190 180,185 Z" fill="#FF8E53" />
    
    <!-- Eye -->
    <circle cx="290" cy="125" r="4" fill="#FFFFFF" opacity="0.9" />
  </g>

  <!-- Foreground Ocean Waves -->
  <path d="M -20,200 C 120,150 220,250 420,180 L 420,320 L -20,320 Z" fill="url(#wave1)" opacity="0.9"/>
  <path d="M -20,230 C 150,280 250,160 420,210 L 420,320 L -20,320 Z" fill="url(#wave2)" opacity="0.9"/>
  <path d="M -20,260 C 180,220 280,290 420,240 L 420,320 L -20,320 Z" fill="#FFFFFF" opacity="0.15"/>
</svg>
