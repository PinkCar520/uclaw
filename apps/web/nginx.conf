server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large payloads (images/attachments)
    client_max_body_size 50m;

    # Gzip 压缩优化
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理 API 请求到 Gateway 容器
    location /api {
        proxy_pass http://gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 集成测试阶段硬编码注入 Mock 身份 (模拟 SSO 网关行为)
        proxy_set_header x-sso-token "mock-dev-token-xyz567";
        proxy_set_header x-user-id "WB-9527";
        proxy_set_header x-user-name "UClaw-Admin";
    }

    # 代理访问网关内部的静态资源（如用户上传的图片）
    # 使用 ^~ 确保优先级高于下面处理静态资源的正则匹配
    location ^~ /public/ {
        proxy_pass http://gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态资源缓存控制
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
