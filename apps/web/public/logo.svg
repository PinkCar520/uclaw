<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Ocean Wave Gradients -->
    <linearGradient id="wave-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2027" />
      <stop offset="50%" stop-color="#203A43" />
      <stop offset="100%" stop-color="#2C5364" />
    </linearGradient>
    <linearGradient id="wave-mid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#005C97" />
      <stop offset="100%" stop-color="#363795" />
    </linearGradient>
    <linearGradient id="wave-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <!-- Kun (Whale) Gradients -->
    <linearGradient id="kun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF416C" />
      <stop offset="100%" stop-color="#FF4B2B" />
    </linearGradient>
    <linearGradient id="kun-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E65C00" />
      <stop offset="100%" stop-color="#F9D423" />
    </linearGradient>
    
    <!-- Sun Gradient -->
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0" />
    </linearGradient>

    <!-- Premium Drop Shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#FF4B2B" flood-opacity="0.3" />
    </filter>
    <filter id="wave-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Glowing Sun/Moon Background -->
  <circle cx="256" cy="220" r="160" fill="url(#sun-grad)" opacity="0.15" />
  <circle cx="256" cy="220" r="100" fill="url(#sun-grad)" opacity="0.25" />

  <!-- Deep Background Wave -->
  <path d="M 0 250 Q 150 150 300 280 T 512 250 L 512 512 L 0 512 Z" fill="url(#wave-dark)" opacity="0.9"/>

  <!-- The Kun (Whale) Leaping -->
  <g filter="url(#shadow)">
    <!-- Main Body: Sweeping crescent from bottom left to top right -->
    <path d="M 120 320 C 100 100, 300 50, 420 120 C 460 145, 450 190, 400 190 C 250 190, 180 250, 120 320 Z" fill="url(#kun-grad)" />
    
    <!-- Split Tail Fin -->
    <path d="M 120 320 C 70 280, 20 300, -10 360 C 60 340, 90 370, 140 430 C 130 370, 135 340, 120 320 Z" fill="url(#kun-grad)" />
    
    <!-- Pectoral Fin -->
    <path d="M 280 175 C 310 240, 360 290, 390 340 C 350 290, 300 240, 260 190 Z" fill="url(#kun-grad-dark)" />
    
    <!-- Whale Belly Ribs (Details) -->
    <path d="M 160 210 Q 240 210 330 160" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
    <path d="M 150 230 Q 220 230 300 170" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
    <path d="M 140 250 Q 200 250 270 180" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.3"/>
    
    <!-- Eye -->
    <circle cx="380" cy="140" r="5" fill="#FFFFFF" />
    <circle cx="382" cy="138" r="2" fill="#FF4B2B" />
  </g>

  <!-- Massive Crashing Mid Wave -->
  <path d="M -50 480 C 100 400 180 120 350 120 C 420 120 480 180 420 250 C 360 320 250 250 180 350 C 120 450 50 512 -50 512 Z" fill="url(#wave-mid)" filter="url(#wave-shadow)" opacity="0.95"/>
  
  <!-- Dynamic Water Splashes / Droplets -->
  <circle cx="450" cy="180" r="8" fill="#00C6FF" opacity="0.9"/>
  <circle cx="480" cy="210" r="14" fill="#00C6FF" opacity="0.7"/>
  <circle cx="420" cy="130" r="5" fill="#00C6FF" opacity="0.8"/>
  <circle cx="380" cy="90" r="6" fill="#00C6FF" opacity="0.6"/>
  <circle cx="330" cy="80" r="10" fill="#00C6FF" opacity="0.8"/>
  <circle cx="280" cy="100" r="7" fill="#00C6FF" opacity="0.9"/>
  
  <circle cx="150" cy="380" r="12" fill="#00C6FF" opacity="0.5"/>
  <circle cx="100" cy="420" r="8" fill="#00C6FF" opacity="0.8"/>

  <!-- Foreground Sweeping Wave -->
  <path d="M -50 512 L -50 420 Q 200 350 350 450 T 550 420 L 550 512 Z" fill="url(#wave-light)" opacity="0.9"/>
  
  <!-- Wave Highlights -->
  <path d="M 0 430 Q 200 360 350 460" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 150 130 C 220 130 300 180 350 250" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
