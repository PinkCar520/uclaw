
services:
  # UClaw AI 网关总线 (NestJS + Prisma 7)
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: uclaw-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./agent/skills:/app/agent/skills
      - uclaw_gateway_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/uclaw?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GATEWAY_ROOT=/app
      - ZENTAO_BASE_URL=http://zentao:80
      - JENKINS_BASE_URL=http://jenkins:8080
      - GITLAB_BASE_URL=http://gitlab:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      jenkins:
        condition: service_started
      gitlab:
        condition: service_started

  # UClaw AI 可视化面板 (React/Vite + Nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: uclaw-web
    restart: always
    ports:
      - "8081:80"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    depends_on:
      gateway:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 用户中心持久化核心 (支持 Vector 检索)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uclaw-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=uclaw
    ports:
      - "5432:5432"
    volumes:
      - uclaw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可观测性中心 (Tracing / Jaeger)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: uclaw-jaeger
    restart: always
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 禅道 Web 服务 (集成测试环境)
  zentao:
    image: easysoft/zentao:latest
    container_name: uclaw-zentao
    restart: always
    ports:
      - "8080:80"
    environment:
      - MYSQL_INTERNAL=false
      - MYSQL_HOST=zentao-db
      - MYSQL_PORT=3306
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
      - MYSQL_DATABASE=zentao
    volumes:
      - uclaw_zentao_data:/www/zentaopms
    depends_on:
      zentao-db:
        condition: service_healthy

  # 禅道专用数据库
  zentao-db:
    image: mariadb:10.6
    container_name: uclaw-zentao-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=zentao
      - MYSQL_USER=zentao
      - MYSQL_PASSWORD=zentao_pass
    volumes:
      - uclaw_zentao_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zentao", "-pzentao_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 会话记忆与流控层 (Redis)
  redis:
    image: redis:7-alpine
    container_name: uclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - uclaw_redis_data:/data

  # Jenkins CI/CD
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: uclaw-jenkins
    restart: always
    ports:
      - "8082:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - uclaw_jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  # GitLab 代码托管
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: uclaw-gitlab
    restart: always
    ports:
      - "8083:80"
      - "443:443"
      - "22:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8083'
        gitlab_rails['initial_root_password'] = 'gitlab_admin_pass'
    volumes:
      - uclaw_gitlab_data:/etc/gitlab
      - uclaw_gitlab_logs:/var/log/gitlab
      - uclaw_gitlab_data:/var/opt/gitlab
    shm_size: '256m'

volumes:
  uclaw_postgres_data:
  uclaw_redis_data:
  uclaw_zentao_data:
  uclaw_zentao_mysql:
  uclaw_gateway_uploads:
  uclaw_jenkins_data:
  uclaw_gitlab_data:
  uclaw_gitlab_logs:
