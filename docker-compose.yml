services:
  # Ocean AI 网关总线 (NestJS + Prisma)
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: ocean-gateway
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./agent/skills:/app/agent/skills
      - ocean_gateway_uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ocean?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GATEWAY_ROOT=/app
      # TODO: 既然已剥离本地 DevOps 服务，请在 .env 文件中配置这些云端第三方 SaaS 的真实地址
      - ZENTAO_BASE_URL=${ZENTAO_BASE_URL:-http://zentao:80}
      - JENKINS_BASE_URL=${JENKINS_BASE_URL:-http://jenkins:8080}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-http://gitlab:80}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Ocean AI 可视化面板 (React/Vite + Nginx)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ocean-web
    restart: always
    ports:
      - "8081:80"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M
    depends_on:
      gateway:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # 用户中心持久化核心 (支持 Vector 检索)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ocean-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ocean
    ports:
      - "5432:5432"
    volumes:
      - ocean_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可观测性中心 (Tracing / Jaeger)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ocean-jaeger
    restart: always
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 会话记忆与流控层 (Redis)
  redis:
    image: redis:7-alpine
    container_name: ocean-redis
    ports:
      - "6379:6379"
    volumes:
      - ocean_redis_data:/data

volumes:
  ocean_postgres_data:
  ocean_redis_data:
  ocean_gateway_uploads:
